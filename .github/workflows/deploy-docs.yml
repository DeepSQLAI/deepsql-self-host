# Deploys docs.deepsql.ai (Starlight build) to S3 + CloudFront.
#
# Mirrors the same pattern as basarooms/pmswebapp's deploy workflow:
#   checkout -> AWS credentials -> setup-node -> install -> build -> s3 sync -> invalidate.
#
# Required GitHub repository secrets:
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#
# Region, bucket, and distribution ID are hardcoded - they're not secrets and
# baking them in keeps the workflow self-contained.

name: deploy-docs

on:
  # Auto-deploy when docs source changes land on main.
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/deploy-docs.sh'
      - '.github/workflows/deploy-docs.yml'
  # Always allow manual runs.
  workflow_dispatch:

concurrency:
  group: deploy-docs
  cancel-in-progress: true

env:
  AWS_REGION: us-east-2
  DOCS_BUCKET: deepsql-docs-461084093078-us-east-2
  DOCS_DISTRIBUTION_ID: E3HYE6ZWL00B20
  NODE_VERSION: '22'

jobs:
  build-and-deploy:
    name: Build & deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Fail if not on main
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: |
          echo "::error::deploy-docs may only be dispatched from main (got ${{ github.ref }})"
          exit 1

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: docs/package-lock.json

      - name: Install dependencies
        working-directory: docs
        run: npm ci

      - name: Build Starlight site
        working-directory: docs
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Sync hashed assets to S3 (long cache)
        run: |
          aws s3 sync docs/dist/ "s3://${DOCS_BUCKET}/" \
            --region "${AWS_REGION}" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "*.xml" \
            --exclude "*.json" \
            --exclude "*.txt"

      - name: Sync HTML/XML/JSON/TXT to S3 (short cache)
        run: |
          aws s3 sync docs/dist/ "s3://${DOCS_BUCKET}/" \
            --region "${AWS_REGION}" \
            --cache-control "public, max-age=60, must-revalidate" \
            --exclude "*" \
            --include "*.html" \
            --include "*.xml" \
            --include "*.json" \
            --include "*.txt"

      - name: Invalidate CloudFront
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${DOCS_DISTRIBUTION_ID}" \
            --paths "/*" \
            --query 'Invalidation.{Id:Id,Status:Status}' \
            --output table

      - name: Smoke check origin
        run: |
          curl -fsSI "http://${DOCS_BUCKET}.s3-website.${AWS_REGION}.amazonaws.com/" | head -1
          curl -fsSI "http://${DOCS_BUCKET}.s3-website.${AWS_REGION}.amazonaws.com/quickstart/" | head -1
