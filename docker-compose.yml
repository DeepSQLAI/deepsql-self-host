# ── DeepSQL Self-Hosted Stack ─────────────────────────────────────────────────
# Customer quick start:
#   curl -fsSL https://install.deepsql.ai/install.sh | bash
#
# Application images are public on GitHub Container Registry.
#
# Recommended self-host mode:
#   - Keep Azure OpenAI pointed at DeepSQL-managed credentials for usage metering
#   - Use pgvector locally for RAG storage:
#       VECTOR_STORE_TYPE=pgvector
#       AZURE_SEARCH_ENABLED=false

# Pin the Compose project name in the file itself so EVERY `docker compose`
# invocation — install.sh, manual debugging, cron, an AI agent on the VM —
# resolves to the same project regardless of the working directory. Without
# this, Compose falls back to the lowercased directory basename (e.g.
# "self-host"), which silently spawns a parallel stack with its own empty
# volumes on upgrade. An explicit `-p`/`--project-name` flag still overrides
# this, but that now requires deliberate intent rather than an accident.
name: deepsql-selfhost

services:

  # ── Vault Database (PostgreSQL + pgvector) ──────────────────────────────────
  # pgvector/pgvector image includes the pgvector extension pre-installed.
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_DB:       dba_agent
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c max_connections=200
    ports:
      - "${DEEPSQL_POSTGRES_PORT:-5432}:5432"
    volumes:
      - dba-agent-postgres:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dba_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache (Valkey / Redis-compatible) ────────────────────────────────────────
  valkey:
    image: valkey/valkey:9.0.3
    restart: unless-stopped
    ports:
      - "${DEEPSQL_VALKEY_PORT:-6379}:6379"
    volumes:
      - dba-agent-valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend (Spring Boot) ─────────────────────────────────────────────────────
  backend:
    image: ${DEEPSQL_BACKEND_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    env_file:
      - ${DEEPSQL_ENV_FILE:-.env}
    environment:
      # Vault DB — points to the postgres service above
      DB_URL:       jdbc:postgresql://postgres:5432/dba_agent?sslmode=disable
      DB_USERNAME:  postgres
      DB_PASSWORD:  ${DB_PASSWORD:-postgres}

      # Cache — points to the valkey service above
      spring.data.redis.host: valkey
      spring.data.redis.port: "6379"

      # CORS — allow the frontend service (and optional custom domain)
      cors.allowed.origins: ${CORS_ALLOWED_ORIGINS:-http://localhost:*}

      # Self-host should default to the hardened production profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SECURITY_PASSWORD_LOGIN_ENABLED: ${SECURITY_PASSWORD_LOGIN_ENABLED:-true}

      # DeepSQL-managed AI configuration. The key and endpoint are entered at
      # install time because they are sensitive; model defaults are packaged.
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${AZURE_OPENAI_CHAT_DEPLOYMENT:-gpt-5.4}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-text-embedding-3-large}
      AZURE_OPENAI_USE_RESPONSES_API: ${AZURE_OPENAI_USE_RESPONSES_API:-true}
      azure.openai.codex-deployment: ${AZURE_OPENAI_CODEX_DEPLOYMENT:-gpt-5.4}
      azure.openai.responses-api-version: ${AZURE_OPENAI_RESPONSES_API_VERSION:-2025-04-01-preview}

      # Self-host RAG storage is local Postgres + pgvector.
      VECTOR_STORE_TYPE: pgvector
      AZURE_SEARCH_ENABLED: "false"
      SPRING_AUTOCONFIGURE_EXCLUDE: ${SPRING_AUTOCONFIGURE_EXCLUDE:-org.springframework.ai.vectorstore.azure.autoconfigure.AzureVectorStoreAutoConfiguration}
    ports:
      - "${DEEPSQL_BACKEND_PORT:-9085}:8080"
    volumes:
      - dba-agent-logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── DeepSQL Agent (Hermes-based chat) ─────────────────────────────────────────
  # Default-on chat surface. Internal-only: NO host port — the frontend nginx
  # proxies `/agent-api/` here (gated by a valid DeepSQL session), and the
  # backend reaches it over the compose network for channel replies (Slack).
  # Per-user isolation: on Agent-tab open the backend mints a per-user MCP token
  # and provisions that user's Hermes profile via the agent's provisioner, so
  # the agent acts with the user's RBAC/connection scope. This requires
  # AGENT_PROVISION_SECRET (shared with the backend, auto-generated by
  # install.sh); without it the agent's database tools return 401.
  deepsql-agent:
    image: ${DEEPSQL_AGENT_IMAGE}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - ${DEEPSQL_ENV_FILE:-.env}
    environment:
      # MCP tools reach the backend over the compose network (read-only surface).
      DEEPSQL_API_BASE_URL: http://backend:8080/api/

      # DeepSQL-managed AI configuration (shared with the backend service).
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}

      # Bind for the in-cluster nginx proxy; never exposed on the host directly.
      HERMES_WEBUI_HOST: 0.0.0.0
      HERMES_WEBUI_PORT: "8787"
      # Chunked transfer keeps SSE responsive through the reverse proxy.
      HERMES_WEBUI_SSE_CHUNKED: "1"
      # Allow the DeepSQL app origin to POST cross-origin via the /agent-api proxy.
      HERMES_WEBUI_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:*}

      # Shared with the backend (auto-generated by install.sh). Starts the agent's
      # per-user provisioner; required for the agent's database tools to authenticate.
      AGENT_PROVISION_SECRET: ${AGENT_PROVISION_SECRET:-}
      AGENT_PROVISION_PORT: "8788"
    volumes:
      - dba-agent-agent-home:/root/.hermes
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8787/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ── Frontend (React + nginx) ──────────────────────────────────────────────────
  frontend:
    image: ${DEEPSQL_FRONTEND_IMAGE}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      # Ordering only (service_started, not healthy): the app must still serve
      # if the agent is down — `/agent-api` simply 502s until it recovers.
      deepsql-agent:
        condition: service_started
    ports:
      - "${DEEPSQL_FRONTEND_PORT:-3035}:80"

volumes:
  # Absolute volume names (not prefixed with the Compose project name) so
  # customer data survives accidental or intentional project-name drift on
  # upgrade. Without this, switching project name silently spawns fresh
  # empty volumes alongside the original ones — at best the operator is
  # confused, at worst they take a "data-loss" recovery path that's
  # entirely unnecessary.
  dba-agent-postgres:
    name: dba-agent-postgres
  dba-agent-valkey:
    name: dba-agent-valkey
  dba-agent-logs:
    name: dba-agent-logs
  # DeepSQL Agent profiles, memory, sessions, webui state. Absolute-named like
  # the others so it survives Compose project-name drift on upgrade.
  dba-agent-agent-home:
    name: dba-agent-agent-home
