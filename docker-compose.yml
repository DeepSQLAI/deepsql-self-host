# ── DeepSQL Self-Hosted Stack ─────────────────────────────────────────────────
# Customer quick start:
#   curl -fsSL https://install.deepsql.ai/install.sh | bash
#
# Application images are public on GitHub Container Registry.
#
# Recommended self-host mode:
#   - Keep Azure OpenAI pointed at DeepSQL-managed credentials for usage metering
#   - Use pgvector locally for RAG storage:
#       VECTOR_STORE_TYPE=pgvector
#       AZURE_SEARCH_ENABLED=false

services:

  # ── Vault Database (PostgreSQL + pgvector) ──────────────────────────────────
  # pgvector/pgvector image includes the pgvector extension pre-installed.
  postgres:
    image: pgvector/pgvector:pg18
    restart: unless-stopped
    environment:
      POSTGRES_DB:       dba_agent
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    command: >
      postgres
        -c shared_preload_libraries=pg_stat_statements
        -c pg_stat_statements.track=all
        -c max_connections=200
    ports:
      - "${DEEPSQL_POSTGRES_PORT:-5432}:5432"
    volumes:
      - dba-agent-postgres:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dba_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache (Valkey / Redis-compatible) ────────────────────────────────────────
  valkey:
    image: valkey/valkey:9.0.3
    restart: unless-stopped
    ports:
      - "${DEEPSQL_VALKEY_PORT:-6379}:6379"
    volumes:
      - dba-agent-valkey:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Backend (Spring Boot) ─────────────────────────────────────────────────────
  backend:
    image: ${DEEPSQL_BACKEND_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      valkey:
        condition: service_healthy
    env_file:
      - ${DEEPSQL_ENV_FILE:-.env}
    environment:
      # Vault DB — points to the postgres service above
      DB_URL:       jdbc:postgresql://postgres:5432/dba_agent?sslmode=disable
      DB_USERNAME:  postgres
      DB_PASSWORD:  ${DB_PASSWORD:-postgres}

      # Cache — points to the valkey service above
      spring.data.redis.host: valkey
      spring.data.redis.port: "6379"

      # CORS — allow the frontend service (and optional custom domain)
      cors.allowed.origins: ${CORS_ALLOWED_ORIGINS:-http://localhost:*}

      # Self-host should default to the hardened production profile
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SECURITY_PASSWORD_LOGIN_ENABLED: ${SECURITY_PASSWORD_LOGIN_ENABLED:-true}

      # DeepSQL-managed AI configuration. The key and endpoint are entered at
      # install time because they are sensitive; model defaults are packaged.
      AZURE_OPENAI_KEY: ${AZURE_OPENAI_KEY}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_CHAT_DEPLOYMENT: ${AZURE_OPENAI_CHAT_DEPLOYMENT:-gpt-5.4}
      AZURE_OPENAI_EMBEDDING_DEPLOYMENT: ${AZURE_OPENAI_EMBEDDING_DEPLOYMENT:-text-embedding-3-large}
      AZURE_OPENAI_USE_RESPONSES_API: ${AZURE_OPENAI_USE_RESPONSES_API:-true}
      azure.openai.codex-deployment: ${AZURE_OPENAI_CODEX_DEPLOYMENT:-gpt-5.4}
      azure.openai.responses-api-version: ${AZURE_OPENAI_RESPONSES_API_VERSION:-2025-04-01-preview}

      # Self-host RAG storage is local Postgres + pgvector.
      VECTOR_STORE_TYPE: pgvector
      AZURE_SEARCH_ENABLED: "false"
      SPRING_AUTOCONFIGURE_EXCLUDE: ${SPRING_AUTOCONFIGURE_EXCLUDE:-org.springframework.ai.vectorstore.azure.autoconfigure.AzureVectorStoreAutoConfiguration}
    ports:
      - "${DEEPSQL_BACKEND_PORT:-9085}:8080"
    volumes:
      - dba-agent-logs:/app/logs
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/api/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Frontend (React + nginx) ──────────────────────────────────────────────────
  frontend:
    image: ${DEEPSQL_FRONTEND_IMAGE}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${DEEPSQL_FRONTEND_PORT:-3035}:80"

volumes:
  dba-agent-postgres:
  dba-agent-valkey:
  dba-agent-logs:
